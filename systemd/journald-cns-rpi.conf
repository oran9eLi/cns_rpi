# 安装到 /etc/systemd/journald.conf.d/90-cns-rpi.conf
#
# 日志只写内存，避免现场直接断电损坏 SD 卡文件系统。
# Raspberry Pi OS 的厂商 drop-in（/usr/lib/systemd/journald.conf.d/
# 40-rpi-volatile-storage.conf）已把 Storage 设为 volatile，这里显式重申，
# 避免系统升级改动厂商文件后行为发生静默变化；/etc 优先级高于 /usr/lib。
#
# RuntimeMaxUse 是本文件的实质作用：不设时默认约为内存的 10%（4GB 机器上约 400MB），
# 设为 16M 后日志内存占用有硬上限，写满自动淘汰旧日志。
# 代价是重启后历史日志全部丢失，这是产品化的预期行为；业务日志另有
# 独立的有界滚动文件，不受影响。
[Journal]
Storage=volatile
RuntimeMaxUse=16M
