# 安装到 /etc/rpi/swap.conf.d/50-cns-rpi.conf
#
# 只读根文件系统下必须使用纯 zram swap，不能用默认的 zram+file。
#
# Raspberry Pi OS 的默认机制是 auto（当前等价于 zram+file）：zram 压缩内存，
# 并把冷页回写到 /var/swap 这个磁盘文件。启用 OverlayFS 后根文件系统不可写，
# 该文件的 loop 设备建立失败，整条依赖链一起垮掉：
#
#   systemd-remount-fs.service        失败（overlay 不支持 reconfigure）
#     → rpi-setup-loop@var-swap.service   依赖失败
#     → systemd-zram-setup@zram0.service  依赖失败
#     → dev-zram0.swap                    依赖失败
#
# 结果是设备完全没有 swap，且有失败单元每隔几十秒重试一次。
#
# 改成纯 zram 后，dev-zram0.swap 只依赖 zram 设备本身，不碰磁盘、不依赖可写
# 根分区，因此在只读系统下正常工作；生成器还会自动产生
# rpi-remove-swap-file@var-swap.service 清理不再需要的 /var/swap。
#
# 代价：没有磁盘回写层，可用 swap 上限就是压缩后的内存本身。对本产品是合适的
# 取舍——现场设备本来就要避免写 SD 卡。
[Main]
Mechanism=zram
